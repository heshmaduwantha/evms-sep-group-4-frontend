<div class="login-wrapper">
    <p-card header="Login" subheader="Event Volunteer Management System" styleClass="login-card shadow-4">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-3">
            <div class="flex flex-column gap-2">
                <label for="email">Email</label>
                <input pInputText id="email" formControlName="email" type="email" placeholder="Enter email"
                    class="w-full" />
                <small class="p-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    Valid email is required.
                </small>
            </div>

            <div class="flex flex-column gap-2 mt-2">
                <label for="password">Password</label>
                <input pInputText id="password" formControlName="password" type="password" placeholder="Enter password"
                    class="w-full" />
                <small class="p-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    Password is required.
                </small>
            </div>

            <div class="mt-3">
                <p-button label="Login" type="submit" [loading]="loading" [disabled]="loginForm.invalid"
                    styleClass="w-full"></p-button>
            </div>

            <p-messages *ngIf="error" [value]="[{severity:'error', summary:'Error', detail:error}]"
                [closable]="false"></p-messages>

            <div class="text-center mt-3">
                <span>Don't have an account? </span>
                <a routerLink="/auth/register" class="font-bold cursor-pointer text-primary no-underline">Register</a>
            </div>
        </form>
    </p-card>
</div>
