<div class="container">

  <h2>Volunteer Management</h2>

  <!-- Search -->
  <mat-form-field appearance="outline">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)">
  </mat-form-field>

  <!-- Table -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let v">{{v.name}}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let v">{{v.email}}</td>
    </ng-container>

    <!-- Skills -->
    <ng-container matColumnDef="skills">
      <th mat-header-cell *matHeaderCellDef>Skills</th>
      <td mat-cell *matCellDef="let v">{{v.skills}}</td>
    </ng-container>

    <!-- Status Badge -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let v">
        <mat-chip [color]="v.status === 'active' ? 'primary' : 'warn'" selected>
          {{v.status}}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let v">

        <button mat-icon-button [routerLink]="['/volunteers', v.id]">
          <mat-icon>visibility</mat-icon>
        </button>

        <button mat-icon-button [routerLink]="['/volunteers/edit', v.id]">
          <mat-icon>edit</mat-icon>
        </button>

        <!-- Role-based access -->
        <button 
          mat-icon-button 
          color="warn"
          *ngIf="auth.isAdmin() || auth.isOrganizer()"
          (click)="deactivate(v.id!)">

          <mat-icon>block</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <!-- Pagination -->
  <mat-paginator [pageSize]="5"></mat-paginator>
  

</div>
