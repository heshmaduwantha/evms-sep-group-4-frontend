<div class="event-dashboard">
    <div class="header-section">
        <div class="breadcrumb">
            <span>EVMS</span> / <span>Events</span> / <span>Event List</span>
        </div>
        <div class="title-bar">
            <div>
                <h1>Event List</h1>
                <p>Manage and monitor all emergency response events.</p>
            </div>
            <p-button *ngIf="isOrganizer" label="Create Event" icon="pi pi-plus" severity="success"
                [routerLink]="['/events/create']"></p-button>
        </div>
    </div>

    <div class="filter-bar p-toolbar mb-4">
        <div class="p-toolbar-group-left">
            <span class="p-input-icon-left mr-2">
                <i class="pi pi-search"></i>
                <input pInputText type="text" placeholder="Search events..."
                    (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
            </span>
            <p-dropdown [options]="statuses" placeholder="All Status" class="mr-2"
                (onChange)="dt.filter($event.value, 'status', 'equals')"></p-dropdown>
            <p-dropdown [options]="locations" placeholder="All Locations"
                (onChange)="dt.filter($event.value, 'location', 'equals')"></p-dropdown>
        </div>
    </div>

    <div class="card event-table">
        <p-table #dt [value]="events" [loading]="loading" [rows]="10" [paginator]="true" [responsiveLayout]="'scroll'"
            styleClass="p-datatable-sm" [globalFilterFields]="['title', 'location', 'status']"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} results">
            <ng-template pTemplate="header">
                <tr>
                    <th>Event Name</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Volunteers</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-event>
                <tr>
                    <td class="font-bold">{{event.title}}</td>
                    <td>{{event.date | date:'MMM dd, yyyy'}}</td>
                    <td>{{event.location}}</td>
                    <td>
                        <div class="volunteer-progress">
                            <span class="count">{{event.volunteers?.length || 0}} / {{event.volunteersNeeded}}</span>
                            <p-progressBar [value]="getVolunteerProgress(event)" [showValue]="false"
                                [style]="{height: '6px'}"></p-progressBar>
                        </div>
                    </td>
                    <td>
                        <p-tag [value]="event.status | uppercase" [severity]="getStatusSeverity(event.status)"></p-tag>
                    </td>
                    <td>
                        <button pButton icon="pi pi-external-link" class="p-button-text p-button-secondary"
                            [routerLink]="['/events', event.id]"></button>
                        <button pButton icon="pi pi-pencil" class="p-button-text p-button-secondary"
                            [routerLink]="['/events/edit', event.id]"></button>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="text-center p-4">No events found.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
