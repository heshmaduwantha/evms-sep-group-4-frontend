<div class="form-container">
    <p-toast></p-toast>
    <div class="header mb-4">
        <div class="breadcrumb">EVMS / Events / {{isEditMode ? 'Edit' : 'Create'}} Event</div>
        <h1 class="text-2xl font-bold mt-2">{{isEditMode ? 'Edit' : 'Create'}} Event</h1>
        <p class="text-500">Fill in the details below to {{isEditMode ? 'update the' : 'schedule a new'}} event in the
            system.</p>
    </div>

    <div class="card p-5">
        <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
            <div class="grid p-fluid">
                <div class="col-12 mb-3">
                    <label for="title" class="font-bold block mb-2 text-sm text-700">Event Title</label>
                    <input pInputText id="title" formControlName="title" placeholder="e.g. Annual Charity Gala 2024" />
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="date" class="font-bold block mb-2 text-sm text-700">Event Date</label>
                    <p-calendar id="date" formControlName="date" dateFormat="mm/dd/yy" [showIcon]="false"
                        placeholder="mm/dd/yyyy"></p-calendar>
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="time" class="font-bold block mb-2 text-sm text-700">Event Time</label>
                    <p-calendar id="time" formControlName="time" [timeOnly]="true" hourFormat="12" [showIcon]="true"
                        placeholder="hh:mm AM/PM"></p-calendar>
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="location" class="font-bold block mb-2 text-sm text-700">Location</label>
                    <input pInputText id="location" formControlName="location"
                        placeholder="Street address or Venue name" />
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="volunteersNeeded" class="font-bold block mb-2 text-sm text-700">Volunteers
                        Needed</label>
                    <p-inputNumber id="volunteersNeeded" formControlName="volunteersNeeded" [showButtons]="false"
                        [min]="0" placeholder="0"></p-inputNumber>
                </div>

                <div class="col-12 mb-4">
                    <label for="description" class="font-bold block mb-2 text-sm text-700">Event Description</label>
                    <textarea pInputTextarea id="description" formControlName="description" rows="5"
                        placeholder="Provide a detailed description of the event..."></textarea>
                </div>

                <div class="col-12 flex justify-content-end gap-2">
                    <p-button label="Cancel" severity="secondary" [text]="true" routerLink="/events"></p-button>
                    <p-button [label]="isEditMode ? 'Update Event' : 'Create Event'" type="submit" [loading]="loading"
                        severity="success"></p-button>
                </div>
            </div>
        </form>
    </div>
</div>
