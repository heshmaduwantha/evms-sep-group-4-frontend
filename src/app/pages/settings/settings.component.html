<div class="settings-container">
    <p-card header="User Management" subheader="Review and manage all registered users" styleClass="bg-dark-navy">
        <div *ngIf="error" class="p-4 bg-red-900 border-round mb-3">
            {{ error }}
        </div>

        <div *ngIf="!error">
            <p-table [value]="users" [loading]="loading" [paginator]="true" [rows]="10"
                styleClass="p-datatable-sm user-table">
                <ng-template pTemplate="header">
                    <tr>
                        <th style="width: 30%">Email</th>
                        <th style="width: 20%">Role</th>
                        <th style="width: 25%">Created At</th>
                        <th style="width: 25%">Status</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-user>
                    <tr>
                        <td>{{ user.email }}</td>
                        <td>
                            <p-tag [value]="user.role" [severity]="getSeverity(user.role)"></p-tag>
                        </td>
                        <td>{{ user.createdAt | date:'short' }}</td>
                        <td>
                            <i class="pi pi-check-circle text-primary"></i> Active
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center p-4">No users found.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </p-card>
</div>
