<div class="pin-kiosk-container">
  <div class="kiosk-card" *ngIf="!showSuccess">
    <div class="kiosk-header">
      <h1>Self Check-In</h1>
      <p>Enter your 4-digit PIN to join the event</p>
    </div>

    <!-- PIN Display Dots -->
    <div class="pin-display">
      <div class="pin-dot" [class.filled]="enteredPin.length >= 1"></div>
      <div class="pin-dot" [class.filled]="enteredPin.length >= 2"></div>
      <div class="pin-dot" [class.filled]="enteredPin.length >= 3"></div>
      <div class="pin-dot" [class.filled]="enteredPin.length >= 4"></div>
    </div>

    <!-- Status Messages -->
    <div class="status-container">
      <div class="error-msg" *ngIf="errorMessage">
        <i class="pi pi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>
      <div *ngIf="isVerifying" class="verifying">
        Verifying PIN...
      </div>
    </div>

    <!-- Digital Numpad -->
    <div class="numpad">
      <button class="num-btn" (click)="addDigit('1')">1</button>
      <button class="num-btn" (click)="addDigit('2')">2</button>
      <button class="num-btn" (click)="addDigit('3')">3</button>
      
      <button class="num-btn" (click)="addDigit('4')">4</button>
      <button class="num-btn" (click)="addDigit('5')">5</button>
      <button class="num-btn" (click)="addDigit('6')">6</button>
      
      <button class="num-btn" (click)="addDigit('7')">7</button>
      <button class="num-btn" (click)="addDigit('8')">8</button>
      <button class="num-btn" (click)="addDigit('9')">9</button>
      
      <button class="num-btn special delete" (click)="clear()">Clear</button>
      <button class="num-btn" (click)="addDigit('0')">0</button>
      <button class="num-btn special delete" (click)="backspace()">
        <i class="pi pi-arrow-left"></i>
      </button>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" *ngIf="showSuccess">
    <div class="success-content">
      <i class="pi pi-check-circle success-icon"></i>
      <h2>{{ welcomeMessage }}</h2>
      <p>You're all set! Enjoy the event.</p>
    </div>
  </div>
</div>
