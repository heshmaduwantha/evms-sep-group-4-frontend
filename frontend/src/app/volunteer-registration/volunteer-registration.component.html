<p>volunteer-registration works!</p>
<div class="container">
  <h2>Volunteer Registration</h2>

  <form (ngSubmit)="registerVolunteer()" #volunteerForm="ngForm">

    <label>Full Name</label>
    <input type="text" name="name" [(ngModel)]="volunteer.name" required>

    <label>Email</label>
    <input type="email" name="email" [(ngModel)]="volunteer.email" required>

    <label>Phone</label>
    <input type="text" name="phone" [(ngModel)]="volunteer.phone" required>

    <label>Skills</label>
    <input type="text" name="skills" [(ngModel)]="volunteer.skills">

    <label>Availability</label>
    <select name="availability" [(ngModel)]="volunteer.availability">
      <option value="Weekends">Weekends</option>
      <option value="Weekdays">Weekdays</option>
      <option value="Anytime">Anytime</option>
    </select>

    <button type="submit">Register</button>

  </form>
</div>
